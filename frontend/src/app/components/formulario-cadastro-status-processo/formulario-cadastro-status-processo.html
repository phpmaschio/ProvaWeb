<form class="form__container" [formGroup]="formulario">

    <mat-form-field class="form_field__container input__form_field">
        <mat-label>Descição</mat-label>
        <input matInput formControlName="descricao">
        @if (formulario.get('descricao')?.hasError('required')) {
            <mat-error>Descrição é obrigatória</mat-error>
        } @else if (formulario.get('descricao')?.hasError('maxlength')) {
            <mat-error>Descrição deve conter no máximo 50 caracteres</mat-error>
        }
    </mat-form-field>

    <div class="botoes__container">
        <button matFab (click)="dialogRef.close()" class="botao_cancelar_formulario">Cancelar</button>
        <button matFab [disabled]="!formulario.valid" type="submit" (click)="salvar()" class="botao_salvar_formulario">Salvar</button>
    </div>
</form>
